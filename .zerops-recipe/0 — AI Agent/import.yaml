#zeropsPreprocessor=on

# AI Agent — full dev + stage pairs for agent-driven development (the topology Noola
# itself was built on). The dev half (apidev/edgedev/webdev) builds from git with the
# *dev setups: they only preinstall deps and deploy the WHOLE monorepo, then idle on
# `zsc noop`, so each dev container boots WITH the source tree + deps ready for an AI
# agent / developer to adopt and drive via zerops_dev_server. The stage half
# (api/edge/web) builds from git with the *prod setups, so there's always a running
# reference. One shared embedder + runner + single-node stores. Non-HA, lightweight.
#
# Cross-service URLs live at project level (below) — the dev half's api points at the
# shared `embedder`, the edge verifies socket tokens against the durable stage `api`,
# and both web halves target the stage api/edge subdomains. Every signing/DB secret is
# generated. The demo workspace is seeded — sign in with ales@acme.test / demo1234.

project:
  name: noola-agent
  corePackage: LIGHT
  tags:
    - noola
    - support-platform
    - ai-agent
  envVariables:
    # better-auth session signing
    AUTH_SECRET: <@generateRandomString(<48>)>
    # encrypts per-tenant model keys at rest
    MODEL_KEY_SECRET: <@generateRandomString(<48>)>
    # api ↔ edge service-to-service auth
    EDGE_SHARED_SECRET: <@generateRandomString(<48>)>
    # Phoenix (edge) signing base
    SECRET_KEY_BASE: <@generateRandomString(<64>)>
    # app_user DB role
    APP_DB_PASSWORD: <@generateRandomString(<32>)>
    # event_relay DB role
    RELAY_DB_PASSWORD: <@generateRandomString(<32>)>
    # auth_user DB role
    AUTH_DB_PASSWORD: <@generateRandomString(<32>)>

    # api → embedder (RAG)
    EMBED_URL: http://embedder:3001
    # edge → api (socket-token verify)
    API_INTERNAL_URL: http://api:3000
    # api → public web origin (links / CORS / invites)
    WEB_BASE_URL: ${web_zeropsSubdomain}
    # api reads caught mail
    MAILPIT_API_URL: http://mailpit:8025
    # outbound mail → Mailpit sink
    SMTP_HOST: mailpit
    SMTP_PORT: "1025"

services:
  # managed stores (start first)
  - hostname: db
    type: postgresql:single@18
    profile: oltp-hobby
    priority: 10
  - hostname: cache
    type: valkey:single@7.2
    profile: hobby
    priority: 10
  - hostname: broker
    type: nats:single@2.12
    priority: 10
  - hostname: search
    type: typesense:single@30.2
    priority: 10
  - hostname: qdrant
    type: qdrant:single@1.12
    priority: 10
  - hostname: storage
    type: object-storage
    objectStorageSize: 5
    priority: 10
  - hostname: mailpit
    type: alpine@3.24
    buildFromGit: https://github.com/zeropsio/recipe-mailpit
    enableSubdomainAccess: true
    priority: 10

  # shared always-on services
  - hostname: embedder
    type: nodejs@24
    buildFromGit: https://github.com/fxck/noola
    zeropsSetup: embedder
    minContainers: 1
    maxContainers: 1
  - hostname: runner
    type: docker@26.1.5
    buildFromGit: https://github.com/fxck/noola
    zeropsSetup: runner
    minContainers: 1
    maxContainers: 1

  # dev half (boots WITH source via the *dev setups; idle on `zsc noop` for the agent)
  - hostname: apidev
    type: nodejs@24
    buildFromGit: https://github.com/fxck/noola
    zeropsSetup: apidev
    enableSubdomainAccess: true
    minContainers: 1
    maxContainers: 1
  - hostname: edgedev
    type: elixir@1.16.3
    buildFromGit: https://github.com/fxck/noola
    zeropsSetup: edgedev
    enableSubdomainAccess: true
    minContainers: 1
    maxContainers: 1
  - hostname: webdev
    type: nodejs@22
    buildFromGit: https://github.com/fxck/noola
    zeropsSetup: webdev
    enableSubdomainAccess: true
    minContainers: 1
    maxContainers: 1

  # stage half (built from git with the *prod setups; running reference)
  - hostname: api
    type: nodejs@24
    buildFromGit: https://github.com/fxck/noola
    zeropsSetup: apiprod
    enableSubdomainAccess: true
    minContainers: 1
    maxContainers: 1
  - hostname: edge
    type: elixir@1.16.3
    buildFromGit: https://github.com/fxck/noola
    zeropsSetup: edgeprod
    enableSubdomainAccess: true
    minContainers: 1
    maxContainers: 1
  - hostname: web
    type: static@1.0
    buildFromGit: https://github.com/fxck/noola
    zeropsSetup: webprod
    enableSubdomainAccess: true
    minContainers: 1
    maxContainers: 1
