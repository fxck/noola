#zeropsPreprocessor=on

# HA Production — highly-available managed clusters (PostgreSQL, Valkey, NATS, Typesense
# and Qdrant all :ha), with the api, edge and web runtimes on dedicated CPU autoscaling
# 2→4 and a redundant runner pool. No demo seed: set BOOTSTRAP_ADMIN_EMAIL +
# BOOTSTRAP_ADMIN_PASSWORD for the first admin. Outbound email is off until you set
# SMTP_HOST / SMTP_USER / SMTP_PASS. Choose this when you're serving real traffic and
# need resilience to node failures and rolling deploys.

project:
  name: noola
  corePackage: SERIOUS
  tags:
    - noola
    - support-platform
    - production
    - ha
  envVariables:
    AUTH_SECRET: <@generateRandomString(<48>)>
    MODEL_KEY_SECRET: <@generateRandomString(<48>)>
    EDGE_SHARED_SECRET: <@generateRandomString(<48>)>
    SECRET_KEY_BASE: <@generateRandomString(<64>)>
    APP_DB_PASSWORD: <@generateRandomString(<32>)>
    RELAY_DB_PASSWORD: <@generateRandomString(<32>)>
    AUTH_DB_PASSWORD: <@generateRandomString(<32>)>
    # required — your first admin's password
    BOOTSTRAP_ADMIN_PASSWORD:

    EMBED_URL: http://embedder:3001
    API_INTERNAL_URL: http://api:3000
    WEB_BASE_URL: https://web-${zeropsSubdomainHost}.prg1.zerops.app
    # no demo tenant in production
    DISABLE_DEMO_SEED: "1"
    # single-admin instance — no public self-signup
    DISABLE_WORKSPACE_SIGNUP: "1"
    # required — your first admin's email
    BOOTSTRAP_ADMIN_EMAIL:
    # the first workspace's name
    BOOTSTRAP_ORG_NAME: Noola
    # public backend origins for the built SPA, assembled from the project subdomain
    # ref (zeropsSubdomainHost) so they're known at build time — no dependency on the
    # api/edge services having deployed yet (a sibling ${x_zeropsSubdomain} only resolves
    # after that service's first deploy, which races the web build on a fresh import)
    VITE_API_URL: https://api-${zeropsSubdomainHost}-3000.prg1.zerops.app
    VITE_EDGE_URL: wss://edge-${zeropsSubdomainHost}-4000.prg1.zerops.app

services:
  # managed stores, HA clusters (start first)
  - hostname: db
    type: postgresql:ha@18
    profile: oltp-staging
    priority: 10
  - hostname: cache
    type: valkey:ha@7.2
    profile: staging
    priority: 10
  - hostname: broker
    type: nats:ha@2.12
    priority: 10
  - hostname: search
    type: typesense:ha@30.2
    priority: 10
  - hostname: qdrant
    type: qdrant:ha@1.12
    priority: 10
  - hostname: storage
    type: object-storage
    objectStorageSize: 25
    priority: 10

  # shared always-on services (dedicated CPU)
  - hostname: embedder
    type: nodejs@24
    buildFromGit: https://github.com/fxck/noola
    zeropsSetup: embedder
    minContainers: 1
    maxContainers: 2
    verticalAutoscaling:
      cpuMode: DEDICATED
  - hostname: geo
    type: nodejs@24
    buildFromGit: https://github.com/fxck/noola
    zeropsSetup: geo
    minContainers: 1
    maxContainers: 2
  - hostname: runner
    type: docker@26.1.5
    buildFromGit: https://github.com/fxck/noola
    zeropsSetup: runner
    minContainers: 2
    maxContainers: 2
    verticalAutoscaling:
      cpuMode: DEDICATED

  # app services (dedicated CPU, autoscale 2→4)
  - hostname: api
    type: nodejs@24
    buildFromGit: https://github.com/fxck/noola
    zeropsSetup: apiprod
    enableSubdomainAccess: true
    minContainers: 2
    maxContainers: 4
    verticalAutoscaling:
      cpuMode: DEDICATED
  - hostname: edge
    type: elixir@1.16.3
    buildFromGit: https://github.com/fxck/noola
    zeropsSetup: edgeprod
    enableSubdomainAccess: true
    minContainers: 2
    maxContainers: 4
    verticalAutoscaling:
      cpuMode: DEDICATED
      minRam: 2
      minFreeRamGB: 0.25
      minFreeRamPercent: 15
  - hostname: web
    type: static@1.0
    buildFromGit: https://github.com/fxck/noola
    zeropsSetup: webprod
    enableSubdomainAccess: true
    minContainers: 2
    maxContainers: 4
    verticalAutoscaling:
      cpuMode: DEDICATED
