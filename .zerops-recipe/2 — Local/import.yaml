#zeropsPreprocessor=on

# Local — backing stores + Mailpit only, no app containers. Bring up the Zerops VPN
# (`zcli vpn up`) and run api, edge, embedder and web on your own machine, pointing the
# DB / cache / broker / search / qdrant / storage env at the internal hostnames below.
# Your local api runs the migrator (with the super credentials over the VPN), which
# creates the app_user / event_relay / auth_user roles from your local .env. Cheapest
# way to develop against real managed services.

project:
  name: noola-local
  corePackage: LIGHT
  tags:
    - noola
    - support-platform
    - local

services:
  - hostname: db
    type: postgresql:single@18
    profile: oltp-hobby
    priority: 10
  - hostname: cache
    type: valkey:single@7.2
    profile: hobby
    priority: 10
  - hostname: broker
    type: nats:single@2.12
    priority: 10
  - hostname: search
    type: typesense:single@30.2
    priority: 10
  - hostname: qdrant
    type: qdrant:single@1.12
    priority: 10
  - hostname: storage
    type: object-storage
    objectStorageSize: 5
    priority: 10
  - hostname: mailpit
    type: alpine@3.24
    buildFromGit: https://github.com/zeropsio/recipe-mailpit
    enableSubdomainAccess: true
    priority: 10
