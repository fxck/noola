<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ask AI — widget test harness</title>
<style>
  :root {
    --bg:#f6f4ef; --card:#fffdf9; --ink:#1b1915; --muted:#6c665b; --faint:#98917f;
    --border:#e7e2d7; --accent:#b0741a; --accent-ink:#fff;
    --ai:#faf7f1; --user:#f0e4cf;
  }
  @media (prefers-color-scheme:dark){:root{
    --bg:#131210; --card:#1b1915; --ink:#efece4; --muted:#a49d8f; --faint:#766f61;
    --border:#2c2820; --accent:#e0a63f; --accent-ink:#1b1400; --ai:#201d18; --user:#2c2413;
  }}
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    display:grid;place-items:center;padding:1.2rem}
  .frame{width:100%;max-width:440px}
  .lead{text-align:center;margin:0 0 .8rem;color:var(--muted);font-size:.82rem}
  .lead b{color:var(--ink)}
  .widget{background:var(--card);border:1px solid var(--border);border-radius:18px;
    overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.10);display:flex;flex-direction:column;
    height:min(78vh,640px)}
  .head{display:flex;align-items:center;gap:.6rem;padding:.85rem 1rem;border-bottom:1px solid var(--border)}
  .mark{width:30px;height:30px;border-radius:9px;background:var(--accent);color:var(--accent-ink);
    display:grid;place-items:center;font-weight:800;font-size:.95rem}
  .head h1{font-size:.98rem;margin:0;letter-spacing:-.01em}
  .head .sub{font-size:.72rem;color:var(--faint)}
  .dot{margin-left:auto;width:.5rem;height:.5rem;border-radius:50%;background:#c9a34a}
  .dot.live{background:#1f9d63}
  .log{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.75rem}
  .row{display:flex;flex-direction:column;max-width:88%}
  .row.me{align-self:flex-end;align-items:flex-end}
  .row.ai{align-self:flex-start}
  .bubble{padding:.6rem .8rem;border-radius:14px;font-size:.9rem;line-height:1.45;white-space:pre-wrap}
  .me .bubble{background:var(--user);border-bottom-right-radius:4px}
  .ai .bubble{background:var(--ai);border:1px solid var(--border);border-bottom-left-radius:4px}
  .who{font-size:.66rem;color:var(--faint);margin:0 .3rem .2rem;text-transform:uppercase;letter-spacing:.07em}
  .sources{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.4rem}
  .src{font-size:.68rem;color:var(--muted);background:var(--bg);border:1px solid var(--border);
    border-radius:999px;padding:.12rem .5rem;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .nerd{margin-top:.35rem;font-family:ui-monospace,Menlo,monospace;font-size:.64rem;color:var(--faint);
    display:flex;gap:.55rem;flex-wrap:wrap}
  .nerd b{color:var(--muted);font-weight:600}
  .think{display:inline-flex;gap:.25rem}
  .think span{width:.35rem;height:.35rem;border-radius:50%;background:var(--faint);animation:b 1s infinite}
  .think span:nth-child(2){animation-delay:.15s}.think span:nth-child(3){animation-delay:.3s}
  @keyframes b{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-2px)}}
  .foot{border-top:1px solid var(--border);padding:.6rem;display:flex;gap:.5rem}
  textarea{flex:1;resize:none;border:1px solid var(--border);border-radius:11px;background:var(--bg);
    color:var(--ink);padding:.55rem .7rem;font:inherit;font-size:.9rem;max-height:120px}
  textarea:focus{outline:none;border-color:var(--accent)}
  button{border:none;background:var(--accent);color:var(--accent-ink);border-radius:11px;
    padding:0 1rem;font-weight:600;cursor:pointer;font-size:.9rem}
  button:disabled{opacity:.5;cursor:not-allowed}
  .err{color:#c0392b;font-size:.78rem;text-align:center;padding:.4rem}
</style>
</head>
<body>
  <div class="frame">
    <p class="lead"><b>Ask&nbsp;AI</b> — widget test harness · live against the stage API</p>
    <div class="widget">
      <div class="head">
        <div class="mark">A</div>
        <div><h1>Ask Noola</h1><div class="sub" id="sub">connecting…</div></div>
        <div class="dot" id="dot"></div>
      </div>
      <div class="log" id="log"></div>
      <div class="err" id="err" style="display:none"></div>
      <div class="foot">
        <textarea id="q" rows="1" placeholder="Ask a question…" disabled></textarea>
        <button id="send" disabled>Ask</button>
      </div>
    </div>
  </div>

<script>
// Ask-AI widget harness — now on the REAL public product path: POST /public/ask with a
// PUBLIC widget key (embedded in the page, not a secret) + a per-key domain allowlist.
// No agent login, no tenant id in the client. KEY is the seeded demo key for Acme.
const API = "https://apistage-561-3000.prg1.zerops.app";
const KEY = "wk_demo_acme";
const CONV = (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : String(Date.now());

const log = document.getElementById("log");
const qEl = document.getElementById("q");
const sendBtn = document.getElementById("send");
const sub = document.getElementById("sub");
const dot = document.getElementById("dot");
const errEl = document.getElementById("err");

let busy = false;

function bubble(kind, who){
  const row = document.createElement("div");
  row.className = "row " + kind;
  row.innerHTML = `<div class="who">${who}</div><div class="bubble"></div>`;
  log.appendChild(row);
  log.scrollTop = log.scrollHeight;
  return row.querySelector(".bubble");
}

function ready(){
  sub.textContent = "connected · grounded in the knowledge base";
  dot.classList.add("live");
  qEl.disabled = false; sendBtn.disabled = false; qEl.focus();
  bubble("ai","Noola AI").textContent =
    "Hi! Ask me anything about the product — I answer from the knowledge base and cite my sources.";
}

async function ask(){
  const q = qEl.value.trim();
  if(!q || busy) return;
  busy = true; sendBtn.disabled = true; qEl.value = ""; qEl.style.height = "auto";
  bubble("me","You").textContent = q;

  const think = bubble("ai","Noola AI");
  think.innerHTML = `<span class="think"><span></span><span></span><span></span></span>`;

  try {
    const r = await fetch(API + "/public/ask", {
      method:"POST",
      headers:{"content-type":"application/json"},
      body: JSON.stringify({ key: KEY, question: q, conversationId: CONV }),
    });
    if(!r.ok) throw new Error("HTTP " + r.status);
    const s = await r.json();

    think.innerHTML = "";
    think.textContent = s.answer || "(no answer)";

    const cites = s.citations || [];
    if(cites.length){
      const sr = document.createElement("div"); sr.className = "sources";
      cites.forEach(c => {
        const chip = document.createElement("span"); chip.className = "src";
        chip.textContent = c.title || "source";
        if(c.snippet) chip.title = c.snippet;
        sr.appendChild(chip);
      });
      think.parentElement.appendChild(sr);
    }
    if(s.confidence != null){
      const nerd = document.createElement("div"); nerd.className = "nerd";
      nerd.innerHTML = `<span>conf ${Math.round(s.confidence*100)}%</span><span>${cites.length} src</span>`;
      think.parentElement.appendChild(nerd);
    }
  } catch(e){
    think.textContent = "Sorry — something went wrong. (" + e.message + ")";
  } finally {
    busy = false; sendBtn.disabled = false; qEl.focus();
    log.scrollTop = log.scrollHeight;
  }
}

qEl.addEventListener("input", () => { qEl.style.height="auto"; qEl.style.height=Math.min(qEl.scrollHeight,120)+"px"; });
qEl.addEventListener("keydown", e => { if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); ask(); } });
sendBtn.addEventListener("click", ask);
ready();
</script>
</body>
</html>
