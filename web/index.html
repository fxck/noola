<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <title>Noola</title>
    <meta
      name="description"
      content="Noola is customer support with workflow automation built in — every channel in one inbox, an AI agent grounded in your docs, and Studio flows that run the busywork."
    />
    <!-- The noola "oo" mark: a graphite ring (the conversation loop) beside the lit amber
         signal dot (the answer) — the two o's of the name, two nodes of a flow. -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2024%2024'%3E%3Crect%20width='24'%20height='24'%20rx='6'%20fill='%231c1b18'/%3E%3Ccircle%20cx='8'%20cy='12'%20r='3.9'%20fill='none'%20stroke='%23e7e3da'%20stroke-width='2.1'/%3E%3Ccircle%20cx='16.6'%20cy='12'%20r='4.1'%20fill='%23EFA43C'/%3E%3C/svg%3E"
    />
    <script>
      // Set the theme class before paint to avoid a flash (OS pref, or a saved override).
      (function () {
        try {
          var t = localStorage.getItem("noola.theme");
          var dark = t ? t === "dark" : matchMedia("(prefers-color-scheme: dark)").matches;
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
